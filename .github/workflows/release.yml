name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mex-linux
          - os: windows-latest
            artifact_name: mex-windows
    env:
      # Target x86-64-v2 for broad compatibility (SSE4.2+) while maintaining performance.
      # This overrides the local target-cpu=native setting in CI.
      RUSTFLAGS: "-C target-cpu=x86-64-v2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2023a

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get MATLAB root path (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # 1. Locate the matlab executable and resolve all symlinks
          MATLAB_EXE=$(readlink -f $(which matlab))
          
          # 2. Traverse up two directory levels (from <root>/bin/matlab to <root>)
          MATLAB_ROOT=$(dirname $(dirname "$MATLAB_EXE"))
          
          if [ -z "$MATLAB_ROOT" ] || [ "$MATLAB_ROOT" == "." ]; then
            echo "Error: Could not determine MATLAB_ROOT"
            exit 1
          fi
          
          # 3. Export as a GitHub environment variable for subsequent steps
          echo "MATLAB_ROOT=$MATLAB_ROOT" >> $GITHUB_ENV
          echo "MATLAB is installed at: $MATLAB_ROOT"

      - name: Get MATLAB root path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1. Locate the executable and resolve its path
          $MatlabExe = (Get-Command matlab).Path
          
          # 2. Traverse up two levels
          $MatlabRoot = Split-Path (Split-Path $MatlabExe)
          
          if ([string]::IsNullOrWhiteSpace($MatlabRoot)) {
            Write-Error "Could not determine MATLAB_ROOT"
            exit 1
          }
          
          # 3. Export to GitHub ENV
          "MATLAB_ROOT=$MatlabRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "MATLAB is installed at: $MatlabRoot"

      - name: Build extensions
        env:
          MATLABPATH: ${{ env.MATLAB_ROOT }}
        run: cargo xtask dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-mex
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-mex/*.mexw64
            all-mex/*.mexa64
          generate_release_notes: true
